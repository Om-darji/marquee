<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/b5e8dcc289.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="profile-card">
        <div class="cover-photo">
            <button class="add-btn">+</button>
        </div>

        <div class="profile-pic-container">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?fit=crop&w=150&h=150" alt="Noah Thompson" class="profile-pic">
        </div>

        <div class="profile-info">
            <h2>Noah Thompson</h2>
            <p>Product Designer who focuses on<br>simplicity & usability.</p>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-value">72.9K</span>
                <span class="stat-label">Likes</span>
            </div>
            <div class="stat-box">
                <span class="stat-value">828</span>
                <span class="stat-label">Posts</span>
            </div>
            <div class="stat-box">
                <span class="stat-value">342.9K</span>
                <span class="stat-label">Views</span>
            </div>
        </div>

        <div class="social-links">
            <span class="icon"><i class="fa-brands fa-instagram"></i></span> <span class="icon">𝕏</span> <span class="icon"><i class="fa-brands fa-threads"></i></span> </div>
    </div>

</body>
</html>
